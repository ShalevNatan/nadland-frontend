name: CI — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            shalevnatan6/nadland-frontend:${{ github.sha }}
            shalevnatan6/nadland-frontend:latest

      - name: Update GitOps repo
        env:
          DEPLOY_KEY: ${{ secrets.GITOPS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/gitops_deploy_key
          chmod 600 ~/.ssh/gitops_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/gitops_deploy_key -o StrictHostKeyChecking=no"

          git clone git@github.com:ShalevNatan/k3s-gitops.git /tmp/k3s-gitops
          cd /tmp/k3s-gitops
          sed -i "s|shalevnatan6/nadland-frontend:.*|shalevnatan6/nadland-frontend:${{ github.sha }}|g" \
            apps/frontend-prod/overlays/prod/kustomization.yaml

          git config user.email "github-actions@nadland.com"
          git config user.name "GitHub Actions"
          git add apps/frontend-prod/overlays/prod/kustomization.yaml
          git commit -m "ci: update frontend image to ${{ github.sha }}"
          git push
